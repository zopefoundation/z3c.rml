# Generated with zope.meta (https://zopemeta.readthedocs.io/) from:
# https://github.com/zopefoundation/meta/tree/master/src/zope/meta/pure-python
[meta]
template = "pure-python"
commit-id = "4a3c19b7"

[python]
with-windows = false
with-pypy = false
with-future-python = false
with-sphinx-doctests = false
with-macos = false
with-docs = false
with-free-threaded-python = false

[coverage]
fail-under = 82

[manifest]
additional-rules = [
    "recursive-include src *.dtd",
    "recursive-include src *.eps",
    "recursive-include src *.gif",
    "recursive-include src *.pdf",
    "recursive-include src *.png",
    "recursive-include src *.pt",
    "recursive-include src *.rml",
    "recursive-include src *.svg",
    "recursive-include src *.svgz",
    "recursive-include src *.ttf",
    "recursive-include src *.txt",
]

[check-manifest]
additional-ignores = ["test.pdf"]

[github-actions]
additional-install = [
    "sudo apt-get update && sudo apt-get install -y ghostscript libcairo2-dev",

]
